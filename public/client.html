<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Sustain</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="client.css">
    <link rel="icon" type="image/x-icon" href="circle.ico">
  </head>
  <body style="background-color:hsl(0, 0%, 0%);">
    <div id="cursorDiv">
      <svg id="cursorSvg" viewBox="-1 -1 2 2" width="20vmin" height="20vmin"></svg>
    </div>
    <div id="mainDiv">
      <div id="teamDiv1">        
        <svg id="crownSvg1" width="27vmin" height="15vmin" preserveAspectRatio="none"></svg>      
        <svg id="scoreSvg1" width="27vmin" height="27vmin" preserveAspectRatio="none"></svg>
      </div> 
      <div id="upperMapDiv">      
        <svg id="mapSvg" width="100vmin" height="100vmin" viewBox="-50 -50 100 100" preserveAspectRatio="none"></svg>
      </div>
      <div id="teamDiv2">        
        <svg id="crownSvg2" width="27vmin" height="15vmin" preserveAspectRatio="none"></svg>      
        <svg id="scoreSvg2" width="27vmin" height="27vmin" preserveAspectRatio="none"></svg>
      </div> 
    </div>
    <div id="lowerMapDiv"></div>
    <script src="client.js" type="module"></script>
  </body>
</html>
